name: Issue100 Production Route Diagnostics

on:
  workflow_dispatch:
    inputs:
      known_path:
        description: Known short-link route to probe
        required: true
        default: /s/issue100-smoke-known
      missing_path:
        description: Missing short-link route to probe
        required: true
        default: /s/issue100-smoke-missing
      known_diagnostic_id:
        description: Optional known-route diagnostic id override
        required: false
        default: ''
      missing_diagnostic_id:
        description: Optional missing-route diagnostic id override
        required: false
        default: ''
      log_window_minutes:
        description: Minutes of focused log window to retain around probes
        required: true
        default: '10'

permissions:
  contents: read

concurrency:
  group: issue100-production-route-diagnostics-${{ github.repository }}
  cancel-in-progress: false

jobs:
  collect-diagnostics:
    name: Collect Production Route Diagnostics
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Add host to known_hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Validate inputs and prepare metadata
        id: prep
        env:
          INPUT_KNOWN_PATH: ${{ inputs.known_path }}
          INPUT_MISSING_PATH: ${{ inputs.missing_path }}
          INPUT_KNOWN_DIAGNOSTIC_ID: ${{ inputs.known_diagnostic_id }}
          INPUT_MISSING_DIAGNOSTIC_ID: ${{ inputs.missing_diagnostic_id }}
          INPUT_LOG_WINDOW_MINUTES: ${{ inputs.log_window_minutes }}
          SITE_URL_RAW: ${{ secrets.SITE_URL }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail

          validate_route() {
            local value="$1"
            if [[ ! "$value" =~ ^/s/[A-Za-z0-9_-]+$ ]]; then
              echo "Invalid route path: $value"
              exit 1
            fi
          }

          validate_diag() {
            local label="$1"
            local value="$2"
            if [ -z "$value" ]; then
              return 0
            fi
            if [[ ! "$value" =~ ^[A-Za-z0-9][A-Za-z0-9._:-]{7,127}$ ]]; then
              echo "Invalid diagnostic id for $label"
              exit 1
            fi
          }

          validate_window() {
            local value="$1"
            if [[ ! "$value" =~ ^[0-9]+$ ]]; then
              echo "log_window_minutes must be numeric"
              exit 1
            fi
            if [ "$value" -lt 1 ] || [ "$value" -gt 30 ]; then
              echo "log_window_minutes must be between 1 and 30"
              exit 1
            fi
          }

          validate_route "$INPUT_KNOWN_PATH"
          validate_route "$INPUT_MISSING_PATH"
          validate_diag known "$INPUT_KNOWN_DIAGNOSTIC_ID"
          validate_diag missing "$INPUT_MISSING_DIAGNOSTIC_ID"
          validate_window "$INPUT_LOG_WINDOW_MINUTES"

          SITE_URL_CLEAN="$(printf '%s' "$SITE_URL_RAW" | tr -d '\r\n' | sed -E 's#/*$##')"
          if [ -z "$SITE_URL_CLEAN" ]; then
            echo "SITE_URL is empty after normalization"
            exit 1
          fi

          KNOWN_DIAG="$INPUT_KNOWN_DIAGNOSTIC_ID"
          if [ -z "$KNOWN_DIAG" ]; then
            KNOWN_DIAG="issue100-known-$(date -u +%Y%m%dT%H%M%SZ)-${GITHUB_RUN_ID}"
          fi

          MISSING_DIAG="$INPUT_MISSING_DIAGNOSTIC_ID"
          if [ -z "$MISSING_DIAG" ]; then
            MISSING_DIAG="issue100-missing-$(date -u +%Y%m%dT%H%M%SZ)-${GITHUB_RUN_ID}"
          fi

          REPORT_NAME="issue100-production-route-diagnostics-${GITHUB_RUN_ID}.txt"
          REPORT_PATH="$RUNNER_TEMP/$REPORT_NAME"
          START_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          {
            echo "site_url=$SITE_URL_CLEAN"
            echo "known_diag=$KNOWN_DIAG"
            echo "missing_diag=$MISSING_DIAG"
            echo "report_name=$REPORT_NAME"
            echo "report_path=$REPORT_PATH"
            echo "start_utc=$START_UTC"
            echo "log_window_minutes=$INPUT_LOG_WINDOW_MINUTES"
            echo "target_container=${PROJECT_NAME}-app"
            echo "project_name=$PROJECT_NAME"
            echo "deploy_path=$DEPLOY_PATH"
          } >> "$GITHUB_OUTPUT"

      - name: Collect remote container evidence
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ steps.prep.outputs.deploy_path }}
          TARGET_CONTAINER: ${{ steps.prep.outputs.target_container }}
          REPORT_PATH: ${{ steps.prep.outputs.report_path }}
          START_UTC: ${{ steps.prep.outputs.start_utc }}
        run: |
          set -euo pipefail

          ssh -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' TARGET_CONTAINER='$TARGET_CONTAINER' START_UTC='$START_UTC' bash -s" <<'ENDSSH' > "$REPORT_PATH"
          set -euo pipefail

          redact_line() {
            sed -E \
              -e 's#(postgres(ql)?://)[^[:space:]"'"'"'@]+(:[^[:space:]"'"'"'@]+)?@#\1<redacted>@#g' \
              -e 's#([Pp]assword=)[^[:space:]]+#\1<redacted>#g' \
              -e 's#([A-Z_]*(SECRET|TOKEN|PASSWORD|KEY|DATABASE_URL|AUTH_URL|NEXTAUTH_URL)=).*#\1<redacted>#g' \
              -e 's#(Authorization: ).*#\1<redacted>#g' \
              -e 's#(Cookie: ).*#\1<redacted>#g'
          }

          section() {
            printf '\n== %s ==\n' "$1"
          }

          cd "$DEPLOY_PATH"

          section "Remote Context"
          printf 'capturedAt=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          printf 'host=%s\n' '<redacted>'
          printf 'deployPath=%s\n' "$DEPLOY_PATH"
          printf 'targetContainer=%s\n' "$TARGET_CONTAINER"
          printf 'startUtc=%s\n' "$START_UTC"

          section "Compose State"
          docker compose ps 2>&1 | redact_line

          section "Container Identity"
          docker inspect "$TARGET_CONTAINER" --format '{{json .}}' | node -e "const fs=require('fs'); const raw=fs.readFileSync(0,'utf8'); const data=JSON.parse(raw); const envNames=(data.Config.Env||[]).map((entry)=>entry.split('=')[0]).sort(); const labels=data.Config.Labels||{}; const repoDigests=data.RepoDigests||[]; const summary={name:data.Name,id:data.Id,image:data.Config.Image,imageId:data.Image,repoDigests,revision:labels['org.opencontainers.image.revision']||null,health:data.State&&data.State.Health?data.State.Health.Status:null,startedAt:data.State?data.State.StartedAt:null,restartCount:data.RestartCount,user:data.Config.User||null,workingDir:data.Config.WorkingDir||null,entrypoint:data.Config.Entrypoint||null,cmd:data.Config.Cmd||null,arch:data.Architecture||null,os:data.Os||null,envNames}; process.stdout.write(JSON.stringify(summary,null,2));"

          section "Process Snapshot"
          docker top "$TARGET_CONTAINER" -eo pid,ppid,user,etime,comm,args 2>&1 | redact_line

          section "Runtime Versions"
          docker exec "$TARGET_CONTAINER" sh -lc 'printf "node="; node -v; printf "cwd="; pwd; printf "arch="; uname -m' 2>&1 | redact_line

          section "Required Runtime Files"
          docker exec "$TARGET_CONTAINER" sh -lc '
            for path in \
              /app/tsconfig.json \
              /app/src/core \
              /app/src/user \
              /app/src/core/lib/plugin-isolation-worker.ts \
              /app/src/core/db/plugin-lifecycle.ts \
              /app/node_modules/tsx; do
              if [ -e "$path" ]; then
                stat -c "%n|present|%F|%a|%U|%G" "$path"
              else
                printf "%s|missing\n" "$path"
              fi
            done
          ' 2>&1 | redact_line

          section "Readability Checks"
          docker exec "$TARGET_CONTAINER" sh -lc '
            for path in /app/tsconfig.json /app/src/core /app/src/user /app/src/core/lib/plugin-isolation-worker.ts /app/src/core/db/plugin-lifecycle.ts; do
              if [ -r "$path" ]; then
                printf "%s|readable=yes\n" "$path"
              else
                printf "%s|readable=no\n" "$path"
              fi
            done
          ' 2>&1 | redact_line

          section "Worker Allowlist Check"
          docker exec "$TARGET_CONTAINER" sh -lc '
            ALLOWED="NODE_ENV AUTH_SECRET NEXTAUTH_SECRET AUTH_URL NEXTAUTH_URL DATABASE_URL DATABASE_HOST DATABASE_PORT DATABASE_USER DATABASE_PASSWORD DATABASE_NAME PGHOST PGPORT PGUSER PGPASSWORD PGDATABASE PGSSLMODE PHASE2_TEST_DATABASE_URL"
            printenv | cut -d= -f1 | sort | while read -r key; do
              status=no
              for allowed in $ALLOWED; do
                if [ "$key" = "$allowed" ]; then
                  status=yes
                  break
                fi
              done
              printf "%s|allowlisted=%s\n" "$key" "$status"
            done
          ' 2>&1 | redact_line

          section "Local Health From Host"
          docker inspect "$TARGET_CONTAINER" --format '{{range $p, $conf := .NetworkSettings.Ports}}{{if eq $p "3000/tcp"}}{{(index $conf 0).HostPort}}{{end}}{{end}}' | {
            read -r host_port
            printf 'hostPort=%s\n' "$host_port"
            curl -sS -D - --max-time 10 "http://127.0.0.1:${host_port}/api/health" || true
          } | redact_line
          ENDSSH

      - name: Run correlated probes and append results
        env:
          BASE_URL: ${{ steps.prep.outputs.site_url }}
          KNOWN_PATH: ${{ inputs.known_path }}
          MISSING_PATH: ${{ inputs.missing_path }}
          KNOWN_DIAG: ${{ steps.prep.outputs.known_diag }}
          MISSING_DIAG: ${{ steps.prep.outputs.missing_diag }}
          REPORT_PATH: ${{ steps.prep.outputs.report_path }}
        run: |
          set -euo pipefail

          node -e "const https=require('https'); const {URL}=require('url'); const baseUrl=process.env.BASE_URL; const knownPath=process.env.KNOWN_PATH; const missingPath=process.env.MISSING_PATH; const knownDiag=process.env.KNOWN_DIAG; const missingDiag=process.env.MISSING_DIAG; const probes=[{label:'health',path:'/api/health',diag:null},{label:'known-short',path:knownPath,diag:knownDiag},{label:'missing-short',path:missingPath,diag:missingDiag},{label:'known-api',path:'/api/public/url-shortener/'+encodeURIComponent(knownPath.split('/').pop()),diag:knownDiag},{label:'missing-api',path:'/api/public/url-shortener/'+encodeURIComponent(missingPath.split('/').pop()),diag:missingDiag}]; const fetchProbe=(probe)=>new Promise((resolve)=>{ const startedAt=new Date().toISOString(); const url=new URL(probe.path,baseUrl); url.searchParams.set('issue100ts',Date.now().toString()); const requestStart=process.hrtime.bigint(); const req=https.request(url,{method:'GET',headers:{'cache-control':'no-cache',pragma:'no-cache','x-devholm-diagnostic-id':probe.diag||''}},(res)=>{ const chunks=[]; res.on('data',(chunk)=>chunks.push(chunk)); res.on('end',()=>{ const elapsedMs=Number(process.hrtime.bigint()-requestStart)/1e6; const body=Buffer.concat(chunks).toString('utf8').slice(0,4000); resolve({label:probe.label,path:probe.path,diagnosticId:probe.diag,startedAt,durationMs:Math.round(elapsedMs*100)/100,status:res.statusCode,headers:res.headers,body});});}); req.setTimeout(10000,()=>{ req.destroy(new Error('timeout'));}); req.on('error',(error)=>{ const elapsedMs=Number(process.hrtime.bigint()-requestStart)/1e6; resolve({label:probe.label,path:probe.path,diagnosticId:probe.diag,startedAt,durationMs:Math.round(elapsedMs*100)/100,status:null,headers:{},body:'',error:error.message});}); req.end();}); (async()=>{ process.stdout.write('\n== Correlated Probes ==\n'); for (const probe of probes) { const result=await fetchProbe(probe); process.stdout.write(JSON.stringify(result,null,2)+'\n'); } })().catch((error)=>{ console.error(error); process.exit(1);});" >> "$REPORT_PATH"

      - name: Collect focused remote logs and parity details
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ steps.prep.outputs.deploy_path }}
          TARGET_CONTAINER: ${{ steps.prep.outputs.target_container }}
          KNOWN_DIAG: ${{ steps.prep.outputs.known_diag }}
          MISSING_DIAG: ${{ steps.prep.outputs.missing_diag }}
          START_UTC: ${{ steps.prep.outputs.start_utc }}
          LOG_WINDOW_MINUTES: ${{ steps.prep.outputs.log_window_minutes }}
          REPORT_PATH: ${{ steps.prep.outputs.report_path }}
        run: |
          set -euo pipefail

          ssh -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' TARGET_CONTAINER='$TARGET_CONTAINER' START_UTC='$START_UTC' KNOWN_DIAG='$KNOWN_DIAG' MISSING_DIAG='$MISSING_DIAG' LOG_WINDOW_MINUTES='$LOG_WINDOW_MINUTES' bash -s" <<'ENDSSH' >> "$REPORT_PATH"
          set -euo pipefail

          redact_line() {
            sed -E \
              -e 's#(postgres(ql)?://)[^[:space:]"'"'"'@]+(:[^[:space:]"'"'"'@]+)?@#\1<redacted>@#g' \
              -e 's#([Pp]assword=)[^[:space:]]+#\1<redacted>#g' \
              -e 's#(Authorization: ).*#\1<redacted>#g' \
              -e 's#(Cookie: ).*#\1<redacted>#g'
          }

          section() {
            printf '\n== %s ==\n' "$1"
          }

          cd "$DEPLOY_PATH"

          SINCE_UTC="$(date -u -d "$START_UTC - ${LOG_WINDOW_MINUTES} minutes" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u +%Y-%m-%dT%H:%M:%SZ)"

          section "Image Parity"
          docker inspect "$TARGET_CONTAINER" --format '{{range .RepoDigests}}{{println .}}{{end}}' | redact_line

          section "Focused Container Logs"
          docker logs --since "$SINCE_UTC" "$TARGET_CONTAINER" 2>&1 | \
            grep -Ei "$KNOWN_DIAG|$MISSING_DIAG|public route|isolated|worker|match|handle|handler|timeout|database|MODULE_NOT_FOUND|permission|rewrite|Service Unavailable" || true

          section "Nginx Error Tail"
          if command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
            sudo -n tail -n 120 /var/log/nginx/error.log 2>/dev/null | grep -Ei "$KNOWN_DIAG|$MISSING_DIAG|upstream|timeout|connect|502|503" || true
          else
            tail -n 120 /var/log/nginx/error.log 2>/dev/null | grep -Ei "$KNOWN_DIAG|$MISSING_DIAG|upstream|timeout|connect|502|503" || true
          fi
          ENDSSH

      - name: Append workflow conclusion summary
        env:
          REPORT_PATH: ${{ steps.prep.outputs.report_path }}
          CURRENT_SHA: ${{ github.sha }}
          KNOWN_DIAG: ${{ steps.prep.outputs.known_diag }}
          MISSING_DIAG: ${{ steps.prep.outputs.missing_diag }}
        run: |
          set -euo pipefail
          {
            echo
            echo '== Diagnostic Summary =='
            echo "githubSha=$CURRENT_SHA"
            echo "knownDiagnosticId=$KNOWN_DIAG"
            echo "missingDiagnosticId=$MISSING_DIAG"
            echo 'expectedFailurePhase=undetermined-from-static-workflow'
            echo 'nextStep=inspect correlated logs and probe matrix in this artifact before any code change'
          } >> "$REPORT_PATH"

      - name: Upload redacted artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.prep.outputs.report_name }}
          path: ${{ steps.prep.outputs.report_path }}
          retention-days: 2